name: Build GaboTerroir APK

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'Build profile'
        required: false
        default: 'preview'
        type: choice
        options:
          - preview
          - production

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable pnpm via corepack
        run: corepack enable && corepack prepare pnpm@10 --activate

      - name: Install workspace dependencies (mobile only)
        run: pnpm install --filter @workspace/mobile... --no-frozen-lockfile
        env:
          CI: true

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Build APK locally (no cloud quota consumed)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_NO_GIT_STATUS_CHECK: '1'
          EAS_SKIP_AUTO_FINGERPRINT: '1'
          EXPO_NO_DOCTOR: '1'
          CI: '1'
        working-directory: artifacts/mobile
        run: |
          eas build \
            --platform android \
            --profile ${{ github.event.inputs.profile || 'preview' }} \
            --local \
            --output ./GaboTerroir.apk \
            --non-interactive

      - name: Verify APK was created
        run: |
          ls -lh artifacts/mobile/GaboTerroir.apk
          echo "APK size: $(du -sh artifacts/mobile/GaboTerroir.apk | cut -f1)"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GaboTerroir-v${{ github.run_number }}.apk
          path: artifacts/mobile/GaboTerroir.apk
          retention-days: 30
          if-no-files-found: error
